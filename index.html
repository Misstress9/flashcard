<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e1e2f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #0f2f1f, #1b4332, #2d6a4f);
}

h2 {
    font-family: 'Pacifico', cursive;
  font-size: 60px;
  font-weight: 500;

  color: #b02a2a; /* đỏ trầm, không chói */

  letter-spacing: 1px;
  text-align: center;
  margin-bottom: 15px;

  position: relative;
}

/* Container */
.container {
  text-align: center;
}

/* Card */
.card {
  width: 500px;
  height: 300px;
  perspective: 1000px;
  margin: 20px auto;
  cursor: pointer;
  transition: transform 0.4s ease, opacity 0.4s ease;
  
}
.card.hide-left {
  transform: translateX(-50px);
  opacity: 0;
}
.card.hide-right {
  transform: translateX(50px);
  opacity: 0;
}
.card.show {
  transform: translateX(0);
  opacity: 1;
}
.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
  transform-origin: center center;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backface-visibility: hidden;
  box-sizing: border-box;
}

.front {
  background: #2a2a40;
}
.content {
  text-align: center;
}
#question {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}

#hint {
  font-size: 14px;
  opacity: 0.7;
  font-style: italic;
}
#answer {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}
#example {
  font-size: 14px;
  color: #333;
  font-style: italic;
}
.back {
  background: #ffd479;
  color: black;
  transform: rotateY(180deg);
}

/* Buttons */
.buttons {
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #ffd479;
  font-weight: bold;
}

button:hover {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <h2>Flashcard</h2>

  <div class="card" onclick="flipCard()">
    <div class="inner" id="cardInner">
      <div class="front" >
        <div class="content">
            <div id="question"></div>
            <div id="hint"></div>
          </div>
      </div>
      <div class="back" >
        <div class="content">
      <div id="answer"> </div>
        <div id="example"></div>
      </div>
    </div>
    </div>
  </div>

  <div class="buttons">
    <button onclick="changeCard('prev')">Prev</button>
    <button onclick="changeCard('next')">Next</button>
  </div>
</div>

<script>
const flashcards = [
{ q: "Companionship (n)", hint: "the feeling of friendship, closeness, and emotional connection when spending time with someone.", a: "Sự đồng hành", ex: "After years of fighting alone, Levi finally found companionship in the Scout Regiment." },
  { q: "Emphasize (v)", hint: "to show that something is very important or worth giving attention to.", a: "Nhấn mạnh", ex: "Gosho Aoyama often nerfs characters that were expected to be outstanding to emphasize Conan's role as the main character." },
  { q: "Reinforce (v)", hint: "to make something stronger.", a: "Củng cố", ex: "Levi Ackerman reinforces the defense line to protect humanity from Titans." },
  {q: "Stereotype (n)", hint: "a set idea that people have about what someone or something is like, especially an idea that is wrong.", a: "Định kiến", ex: "Mulan breaks the stereotype that women cannot be strong warriors."},
  {q: "Take in (pv)", hint: "to look at and enjoy something carefully.", a: "Chiêm ngưỡng", ex: "Rapunzel stood by the window, taking in the lights floating across the sky."},
  {q: "Essential (aj)", hint: "necessary or needed.", a: "Thiết yếu", ex: "Sherlock Holmes considers observations essential for solving crimes."},
  {q: "Exhibition (n)", hint: "an event at which objects such as paintings are shown to the public, or the act of showing these things", a: "Triển lãm", ex: "Marinette Dupain-Cheng visited a fashion exhibition in Paris for inspiration."},
  {q: "Expert (aj)", hint: "having or showing a lot of knowledge or skill.", a: "Có chuyên môn", ex: "Sherlock Holmes is an expert detective in solving complex cases."},
  {q: "Desire (v)", hint: "to want something, especially strongly.", a: "Mong muốn", ex: "Sasuke Uchiha desires of revenge for his clan"},
  {q: "Workshop (n)", hint: "a room or building where things are made or repaired using machines and/or tools.", a: "Hội thảo", ex: "Hermione Granger attends a magical workshop to improve her spell skills."},
  { q: "Long-held (aj)", hint: "existing for a long time.", a: "Có từ lâu", ex: "Elsa revealed her long-held secret to her sister." },
  { q: "Assumption (n)", hint: "something that you accept as true without question or proof.", a: "Quan niệm", ex: "Sherlock Holmes never makes an assumption without evidence." },
  { q: "Perspective (n)", hint: "a particular way of considering something.", a: "Góc nhìn", ex: "Elsa and Anna have very different perspectives on freedom." },
  { q: "Innovative (aj)", hint: "using new methods or ideas.", a: "Mới mẻ", ex: "Tony Stark is known for his innovative inventions." },
  { q: "Experiment (v)", hint: "to try something in order to discover what it is like or find out more about it.", a: "Thử nghiệm", ex: "Dexter loves to experiment with dangerous inventions." },
  { q: "Steel (n)", hint: "a strong metal that is a mixture of iron and carbon, used for making things that need a strong structure, especially vehicles and buildings' or a particular type of this metal.", a: "Thép", ex: "Tony Stark built powerful steel suits for battle." },
    { q: "Fabric (n)", hint: "cloth or material for making clothes, covering furniture, etc.", a: "Vải", ex: "Marinette Dupain-Cheng loves choosing colorful fabrics for her designs." },
    { q: "Stretch (v)", hint: "to cause something to reach, often as far as possible, in a particular direction.", a: "Giãn", ex: "Monkey D. Luffy can stretch his arms like rubber." },
    { q: "Incorporate (v)", hint: "to include something as part of something larger.", a: "Đưa vào", ex: "Tony Stark incorporated new technology into his suit design." },
    { q: "Feature (v)", hint: "to include someone or something as an important part.", a: "Trưng bày", ex: "Howl's Moving Castle featured magical rooms and strange inventions." },
    { q: "Renowned (aj)", hint: "famous for something.", a: "Nổi tiếng", ex: "Howl Pendragon is a renowned wizard." },
    { q: "Soup kitchen (n)", hint: "a place where free soup or other food is given to people with no money or no home.", a: "Bếp ăn từ thiện", ex: "Anna volunteered at a soup kitchen in the city to help people in need." },
    { q: "Eye-opening (aj)", hint: "surprising and making you understand something in a new way.", a: "Mở mang tầm mắt", ex: "Anna had an eye-opening experience when she finally understood her sister’s powers." },
    { q: "Inspire (v)", hint: "to make someone feel that they want to do something and can do it.", a: "Truyền cảm hứng", ex: "Elsa inspires her people to be brave." },
  ];

let current = 0;

function renderCard() {
  document.getElementById("question").innerText = flashcards[current].q;
  document.getElementById("hint").innerText = flashcards[current].hint;
  document.getElementById("answer").innerText = flashcards[current].a;
  document.getElementById("example").innerText = flashcards[current].ex;
  document.querySelector(".card").classList.remove("flip");
}

function flipCard() {
  document.querySelector(".card").classList.toggle("flip");
}



// load đầu
renderCard();
function changeCard(direction) {
  const card = document.querySelector(".card");
  card.classList.remove("flip");
  // xác định hướng
  const hideClass = direction === "next" ? "hide-left" : "hide-right";

  card.classList.add(hideClass);

  setTimeout(() => {
    // đổi index
    if (direction === "next") {
      current = (current + 1) % flashcards.length;
    } else {
      current = (current - 1 + flashcards.length) % flashcards.length;
    }

    renderCard();

    // reset vị trí trước khi hiện lại
    card.classList.remove(hideClass);
    card.classList.add("show");

    setTimeout(() => {
      card.classList.remove("show");
    }, 400);

  }, 400);
}
</script>

</body>
</html>
